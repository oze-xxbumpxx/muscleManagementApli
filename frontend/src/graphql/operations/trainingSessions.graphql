query TrainingSessions($limit: Int, $offset: Int) {
  trainingSessions(limit: $limit, offset: $offset) {
    totalCount
    items {
      id
      date
      bodyWeight
      notes
      exercises {
        id
        exerciseName
        order
        sets
        reps
        durationSeconds
        weight
      }
    }
  }
}

query TrainingSession($id: Int!) {
  trainingSession(id: $id) {
    id
    date
    bodyWeight
    notes
    exercises {
      id
      exerciseName
      order
      sets
      reps
      durationSeconds
      weight
      notes
    }
  }
}
